syntax = "proto3";

package ai.pipestream.opensearch.v1;

import "ai/pipestream/opensearch/v1/opensearch_document.proto";
import "ai/pipestream/schemamanager/v1/schema_manager.proto";
import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";

option java_multiple_files = true;
option java_package = "ai.pipestream.opensearch.v1";

// The OpenSearchManagerService handles schema management, index lifecycle,
// and administrative operations for OpenSearch indices.
service OpenSearchManagerService {
  // Schema Management (from schema_manager.proto)
  rpc EnsureNestedEmbeddingsFieldExists(ai.pipestream.schemamanager.v1.EnsureNestedEmbeddingsFieldExistsRequest) returns (ai.pipestream.schemamanager.v1.EnsureNestedEmbeddingsFieldExistsResponse);

  // Index Lifecycle Operations
  rpc CreateIndex(CreateIndexRequest) returns (CreateIndexResponse);
  // Deletes an OpenSearch index.
  rpc DeleteIndex(DeleteIndexRequest) returns (DeleteIndexResponse);
  // Checks if an OpenSearch index exists.
  rpc IndexExists(IndexExistsRequest) returns (IndexExistsResponse);

  // Document Operations (single documents)
  rpc IndexDocument(IndexDocumentRequest) returns (IndexDocumentResponse);
  // Indexes a stream of documents for high-throughput bulk ingestion.
  rpc StreamIndexDocuments(stream StreamIndexDocumentsRequest) returns (stream StreamIndexDocumentsResponse);
  // Indexes a document with dynamic schema.
  rpc IndexAnyDocument(IndexAnyDocumentRequest) returns (IndexAnyDocumentResponse);
  // Deletes a document from an index.
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  // Retrieves a document by ID from an index.
  rpc GetOpenSearchDocument(GetOpenSearchDocumentRequest) returns (GetOpenSearchDocumentResponse);

  // Admin Operations
  rpc GetIndexStats(GetIndexStatsRequest) returns (GetIndexStatsResponse);
  // Lists all OpenSearch indices.
  rpc ListIndices(ListIndicesRequest) returns (ListIndicesResponse);
  // Returns a simplified field-level mapping for an index (for admin UI).
  rpc GetIndexMapping(GetIndexMappingRequest) returns (GetIndexMappingResponse);

  // Domain-Specific Search Operations
  rpc SearchFilesystemMeta(SearchFilesystemMetaRequest) returns (SearchFilesystemMetaResponse);
  // Searches document uploads (repository-document-uploads index).
  // Account scoping is derived from the security context (x-account-id header), NOT from the request.
  rpc SearchDocumentUploads(SearchDocumentUploadsRequest) returns (SearchDocumentUploadsResponse);

  // Retrieves the current bulk indexing queue configuration.
  rpc GetBulkConfig(GetBulkConfigRequest) returns (GetBulkConfigResponse);
  // Updates the bulk indexing queue configuration at runtime (queue count, capacity, flush interval).
  rpc UpdateBulkConfig(UpdateBulkConfigRequest) returns (UpdateBulkConfigResponse);
}

// === Schema Management Messages (from schema_manager.proto) ===

// === Index Lifecycle Messages ===

// Request to create a new OpenSearch index with vector search capabilities.
message CreateIndexRequest {
  // Name of the index to create (must be lowercase, no spaces)
  string index_name = 1;
  // Vector field configuration for embedding search
  ai.pipestream.schemamanager.v1.VectorFieldDefinition vector_field_definition = 2;
  // Optional document type hint for schema generation
  optional string document_type = 3;
  // Optional custom OpenSearch index settings (shards, replicas, etc.)
  optional google.protobuf.Struct settings = 4;
  // Nested field name for kNN vector mapping (e.g. "embeddings"). Defaults to "embeddings" if unset.
  optional string vector_field_name = 5;
}

// Response from index creation operation.
message CreateIndexResponse {
  // Whether the index was created successfully
  bool success = 1;
  // Status message or error details
  string message = 2;
}

// Request to delete an OpenSearch index and all its documents.
message DeleteIndexRequest {
  // Name of the index to delete
  string index_name = 1;
}

// Response from index deletion operation.
message DeleteIndexResponse {
  // Whether the index was deleted successfully
  bool success = 1;
  // Status message or error details
  string message = 2;
}

// Request to check if an OpenSearch index exists.
message IndexExistsRequest {
  // Name of the index to check
  string index_name = 1;
}

// Response indicating whether the requested index exists.
message IndexExistsResponse {
  // True if the index exists, false otherwise
  bool exists = 1;
}

// === Document Operation Messages ===

// Request to index a strongly-typed OpenSearchDocument into an index.
message IndexDocumentRequest {
  // Name of the index to insert the document into
  string index_name = 1;
  // The document to index (using canonical OpenSearchDocument schema)
  OpenSearchDocument document = 2;
  // Optional document ID (if not provided, OpenSearch auto-generates one)
  optional string document_id = 3;
  // Optional routing value for controlling shard placement
  optional string routing = 4;
  // Account ID for ownership and binding
  optional string account_id = 5;
  // DataSource ID for ownership and binding
  optional string datasource_id = 6;
  // Strategy for embedding storage. Default (UNSPECIFIED) preserves current nested behavior.
  IndexingStrategy indexing_strategy = 7;
  // For CHUNK_COMBINED / SEPARATE_INDICES: base document with chunk index references.
  optional OpenSearchDocumentMap document_map = 8;
  // For CHUNK_COMBINED / SEPARATE_INDICES: flat chunk documents with embeddings.
  repeated OpenSearchChunkDocument chunk_documents = 9;
}

// Request to index any protobuf message type with dynamic schema mapping.
// Enables indexing custom protobuf types without predefined mapping.
message IndexAnyDocumentRequest {
  // Name of the index to insert the document into
  string index_name = 1;
  // The document to index (can be any protobuf message type)
  google.protobuf.Any document = 2;
  // Optional document ID (if not provided, OpenSearch auto-generates one)
  optional string document_id = 3;
  // Optional routing value for controlling shard placement
  optional string routing = 4;
  // ProtoFieldMapper rules for transforming protobuf fields to index fields
  repeated string field_mappings = 5;
  // Account ID for ownership and binding
  optional string account_id = 6;
  // DataSource ID for ownership and binding
  optional string datasource_id = 7;
}

// Response from indexing a strongly-typed OpenSearchDocument.
message IndexDocumentResponse {
  // Whether the document was indexed successfully
  bool success = 1;
  // The document ID that was indexed (auto-generated if not provided)
  string document_id = 2;
  // Status message or error details
  string message = 3;
}

// Request to stream a strongly-typed OpenSearchDocument into an index.
message StreamIndexDocumentsRequest {
  // A unique ID for this specific request, sent by the client.
  // This ID will be returned in the corresponding StreamIndexDocumentsResponse for correlation.
  string request_id = 1;
  // Name of the index to insert the document into
  string index_name = 2;
  // The document to index (using canonical OpenSearchDocument schema)
  OpenSearchDocument document = 3;
  // Optional document ID (if not provided, OpenSearch auto-generates one)
  optional string document_id = 4;
  // Optional routing value for controlling shard placement
  optional string routing = 5;
  // Account ID for ownership and binding
  optional string account_id = 6;
  // DataSource ID for ownership and binding
  optional string datasource_id = 7;
  // Strategy for embedding storage. Default (UNSPECIFIED) preserves current nested behavior.
  IndexingStrategy indexing_strategy = 8;
}

// Response acknowledging the result of a single StreamIndexDocumentsRequest.
message StreamIndexDocumentsResponse {
  // The correlation ID from the StreamIndexDocumentsRequest.
  string request_id = 1;
  // Whether the document was indexed successfully
  bool success = 2;
  // The document ID that was indexed (auto-generated if not provided)
  string document_id = 3;
  // Status message or error details
  string message = 4;
}

// Response from indexing a dynamically-typed document.
message IndexAnyDocumentResponse {
  // Whether the document was indexed successfully
  bool success = 1;
  // The document ID that was indexed (auto-generated if not provided)
  string document_id = 2;
  // Status message or error details
  string message = 3;
}

// Request to delete a document from an index by ID.
message DeleteDocumentRequest {
  // Name of the index containing the document
  string index_name = 1;
  // ID of the document to delete
  string document_id = 2;
  // Optional routing value used when the document was indexed
  optional string routing = 3;
}

// Response from document deletion operation.
message DeleteDocumentResponse {
  // Whether the document was deleted successfully
  bool success = 1;
  // Status message or error details
  string message = 2;
}

// Request to retrieve a document from an index by ID.
message GetOpenSearchDocumentRequest {
  // Name of the index containing the document
  string index_name = 1;
  // ID of the document to retrieve
  string document_id = 2;
  // Optional routing value used when the document was indexed
  optional string routing = 3;
}

// Response containing the retrieved document if found.
message GetOpenSearchDocumentResponse {
  // Whether the document was found
  bool found = 1;
  // The retrieved document (only present if found=true)
  optional OpenSearchDocument document = 2;
  // Status message or error details
  string message = 3;
}

// === Admin Operation Messages ===

// Request to retrieve statistics about an OpenSearch index.
message GetIndexStatsRequest {
  // Name of the index to get statistics for
  string index_name = 1;
}

// Response containing index statistics and health metrics.
message GetIndexStatsResponse {
  // Whether the stats retrieval was successful
  bool success = 1;
  // Total number of documents in the index
  int64 document_count = 2;
  // Total size of the index in bytes (including all replicas)
  int64 size_in_bytes = 3;
  // Additional OpenSearch-specific statistics (shards, segments, etc.)
  google.protobuf.Struct additional_stats = 4;
  // Status message or error details
  string message = 5;
}

// Request to list all OpenSearch indices, optionally filtered by prefix.
message ListIndicesRequest {
  // Optional prefix to filter index names (e.g., "prod-" to list only production indices)
  optional string prefix_filter = 1;
}

// Response containing a list of indices and their basic information.
message ListIndicesResponse {
  // List of index information objects
  repeated OpenSearchIndexInfo indices = 1;
}

// Semantic vector field bound to an index (from VectorSet / DB), store-agnostic.
message VectorFieldSummary {
  string vector_set_id = 1;
  string vector_set_name = 2;
  string field_name = 3;
  string result_set_name = 4;
  int32 dimensions = 5;
}

// Basic information about a single OpenSearch index.
message OpenSearchIndexInfo {
  // Name of the index
  string name = 1;
  // Total number of documents in the index
  int64 document_count = 2;
  // Total size of the index in bytes
  int64 size_in_bytes = 3;
  // Index health status (green, yellow, red)
  string status = 4;
  // VectorSet-backed bindings for this index (empty if none in DB)
  repeated VectorFieldSummary vector_fields = 5;
}

// Request to retrieve a simplified mapping for an index.
message GetIndexMappingRequest {
  string index_name = 1;
}

// Response with mapping shape aligned to admin REST: { "indexName": { "field": { "type": "..." } } } inside `mappings`.
message GetIndexMappingResponse {
  string index_name = 1;
  google.protobuf.Struct mappings = 2;
}

// === Domain-Specific Search Messages ===

// Request to search filesystem metadata (files/folders) in a drive.
// Supports text search, filtering by node type, metadata filters, and pagination.
message SearchFilesystemMetaRequest {
  // Drive identifier to search within
  string drive = 1;
  // Text query to search in file/folder names and descriptions
  string query = 2;
  // Filter by node types (e.g., ["FILE"], ["FOLDER"], or both)
  repeated string node_types = 3;
  // Exact metadata key-value pairs to filter by
  map<string, string> metadata_filters = 4;
  // Optional parent folder ID to limit search scope to specific directory
  optional string parent_id = 5;
  // Number of results per page (default 50)
  int32 page_size = 6;
  // Pagination token from previous response for next page
  string page_token = 7;
  // Future feature: whether to search within file contents (not just metadata)
  optional bool include_content_search = 8;
}

// Response containing filesystem search results with pagination support.
message SearchFilesystemMetaResponse {
  // List of matching files/folders
  repeated FilesystemSearchResult results = 1;
  // Total count of matching documents (across all pages)
  int64 total_count = 2;
  // Token to fetch the next page of results (empty if no more results)
  string next_page_token = 3;
  // Highest relevance score in this result set
  float max_score = 4;
}

// A single filesystem search result representing a file or folder.
message FilesystemSearchResult {
  // Unique node identifier
  string node_id = 1;
  // Name of the file or folder
  string name = 2;
  // Type of node (FILE or FOLDER)
  string node_type = 3;
  // Drive identifier this node belongs to
  string drive = 4;
  // Parent folder ID (empty for root-level nodes)
  optional string parent_id = 5;
  // Additional metadata key-value pairs associated with this node
  map<string, string> metadata = 6;
  // Search relevance score (higher = more relevant)
  float score = 7;
  // OpenSearch highlight snippets showing where query terms matched
  google.protobuf.Struct highlights = 8;
}

// === Document Upload Search Messages ===

// Request to search document uploads. Account scoping comes from the security context.
message SearchDocumentUploadsRequest {
  // Text query to match against filename, path, and metadata
  string query = 1;
  // Optional connector ID filter
  optional string connector_id = 2;
  // Optional MIME type filter (e.g., "application/pdf")
  optional string mime_type = 3;
  // Number of results per page (default 20, max 100)
  int32 page_size = 4;
  // Pagination token from previous response
  string page_token = 5;
  // Sort field (default: relevance score)
  string sort_by = 6;
  // Sort order: "asc" or "desc" (default: "desc")
  string sort_order = 7;
}

// Response containing document upload search results.
message SearchDocumentUploadsResponse {
  // Matching document uploads
  repeated DocumentUploadResult results = 1;
  // Total count of matching documents across all pages
  int64 total_count = 2;
  // Token to fetch the next page (empty if no more results)
  string next_page_token = 3;
  // Highest relevance score in this result set
  float max_score = 4;
}

// A single document upload search result.
message DocumentUploadResult {
  // Document ID
  string doc_id = 1;
  // Original filename
  string filename = 2;
  // File path
  string path = 3;
  // MIME type
  string mime_type = 4;
  // Account ID that owns this document
  string account_id = 5;
  // Connector ID that ingested this document
  string connector_id = 6;
  // Storage key (e.g., S3 object key, filesystem path, etc.)
  string storage_key = 7;
  // Upload timestamp (epoch millis)
  int64 uploaded_at = 8;
  // Search relevance score
  float score = 9;
}

// === Bulk Indexing Configuration ===

// Runtime configuration for the bulk indexing queue system.
message BulkIndexingConfig {
  // Number of concurrent draining queues (range: 2-10, default: 4)
  int32 queue_count = 1;
  // Maximum items per queue before forced flush (default: 200)
  int32 queue_capacity = 2;
  // Milliseconds between periodic flush sweeps (default: 2000)
  int32 flush_interval_ms = 3;
}

// Request to update the bulk indexing queue configuration at runtime.
message UpdateBulkConfigRequest {
  BulkIndexingConfig config = 1;
}

// Response from bulk config update with the active configuration.
message UpdateBulkConfigResponse {
  bool success = 1;
  BulkIndexingConfig active_config = 2;
  string message = 3;
}

// Request to retrieve the current bulk indexing configuration.
message GetBulkConfigRequest {}

// Response containing the current bulk indexing configuration.
message GetBulkConfigResponse {
  BulkIndexingConfig config = 1;
}
