syntax = "proto3";

package ai.pipestream.opensearch.v1;

import "ai/pipestream/data/v1/pipeline_core_types.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "OpenSearchDocumentProto";
option java_package = "ai.pipestream.opensearch.v1";

// Represents the canonical structure of a document to be indexed in OpenSearch.
// This message is the single source of truth for our document model, combining
// system-managed base fields with a flexible container for arbitrary user data.
message OpenSearchDocument {
  // --- Core Identity & System Fields ---
  // Original document identifier from source system
  string original_doc_id = 1;
  // Document type classification
  string doc_type = 2;
  // User or system that created this document
  string created_by = 3;
  // When the document was first indexed
  google.protobuf.Timestamp created_at = 4;
  // When the document was last modified
  google.protobuf.Timestamp last_modified_at = 5;

  // --- Fields Derived from PipeDoc Schema ---
  // Original source URI where document was retrieved
  optional string source_uri = 6;
  // MIME type of the source document
  optional string source_mime_type = 7;
  // Document title or headline
  optional string title = 8;
  // Main document content/body text
  optional string body = 9;
  // Tags/keywords for categorization and search
  repeated string tags = 10;
  // Revision identifier for version tracking
  optional string revision_id = 11;

  // --- The Nested Embeddings ---
  // A list of semantic vector sets. Each set represents a unique combination
  // of source field, chunker configuration, and embedding model.
  repeated SemanticVectorSet semantic_sets = 12;

  // --- User-Defined Flexible Data ---
  // Flexible JSON container for arbitrary user-defined fields
  // not part of the core PipeDoc schema
  google.protobuf.Struct custom_fields = 13;

  // --- Document-Level Analytics ---
  // Analytics computed from the full source text (before chunking).
  // One entry per (source_field, chunk_config) pair processed.
  repeated ai.pipestream.data.v1.SourceFieldAnalytics source_field_analytics = 14;

  // --- NLP Analysis ---
  // Sentence spans, language detection, POS densities from NLP pass.
  // Populated from the first SemanticProcessingResult that has nlp_analysis.
  optional ai.pipestream.data.v1.NlpDocumentAnalysis nlp_analysis = 15;
}

// A container for a set of embeddings generated by a specific chunker/embedder pair.
message SemanticVectorSet {
  // The original field name in the document (e.g., "body", "summary").
  string source_field_name = 1;

  // The unique identifier of the chunking strategy used.
  string chunk_config_id = 2;

  // The unique identifier of the embedding model used.
  string embedding_id = 3;

  // The actual embeddings produced by this combination.
  repeated OpenSearchEmbedding embeddings = 4;

  // When set, indexing resolves the registered VectorSet (dims, binding) by id.
  optional string vector_set_id = 5;

  // Target nested OpenSearch field for KNN payloads; should match VectorSet.field_name when using vector_set_id.
  optional string nested_field_name = 6;

  // Semantic path: references a pre-registered semantic config.
  optional string semantic_config_id = 7;
  // Granularity of vectors in this set (semantic path only).
  // Shared vocabulary with SemanticProcessingResult.granularity and
  // CentroidMetadata.granularity — defined in common/pipeline_core_types.proto.
  optional ai.pipestream.data.v1.GranularityLevel granularity = 8;
}

// Strategy for how document embeddings are physically stored in OpenSearch.
enum IndexingStrategy {
  // Default/unspecified: all embeddings as nested objects in the parent document.
  INDEXING_STRATEGY_UNSPECIFIED = 0;
  // One flat index per chunk config. Multiple embedding model columns per row.
  // Enables cross-model scoring on the same chunk without joins.
  INDEXING_STRATEGY_CHUNK_COMBINED = 1;
  // One flat index per (chunk config × embedding model). Single vector column per row.
  // Maximum isolation. Simplest mapping and queries.
  INDEXING_STRATEGY_SEPARATE_INDICES = 2;
}

// The canonical representation of a single vector embedding and its associated metadata.
// This is the object that gets stored in the 'nested' field in OpenSearch.
message OpenSearchEmbedding {
  // The vector embedding itself.
  repeated float vector = 1;

  // The original, unmodified source text that was used to generate this vector.
  string source_text = 2;

  // A list of additional, derived textual data related to the source_text.
  repeated string context_text = 3;

  // The unique identifier of the chunking strategy used.
  string chunk_config_id = 4;

  // The unique identifier of the embedding model used.
  string embedding_id = 5;

  // A flag to distinguish "primary" embeddings (from non-chunked fields like a title)
  // from "secondary" embeddings (from the many chunks of a body text).
  bool is_primary = 6;

  // Per-chunk analytics (positional features, text stats, POS ratios)
  optional ai.pipestream.data.v1.ChunkAnalytics chunk_analytics = 7;
}

// Base document for flat indexing strategies (CHUNK_COMBINED, SEPARATE_INDICES).
// Contains all searchable metadata but no embedding vectors.
// Vectors live in separate chunk indices referenced by chunk_indices.
message OpenSearchDocumentMap {
  string original_doc_id = 1;
  string doc_type = 2;
  string created_by = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_modified_at = 5;
  optional string source_uri = 6;
  optional string source_mime_type = 7;
  optional string title = 8;
  optional string body = 9;
  repeated string tags = 10;
  optional string revision_id = 11;
  google.protobuf.Struct custom_fields = 12;
  repeated ai.pipestream.data.v1.SourceFieldAnalytics source_field_analytics = 13;
  optional ai.pipestream.data.v1.NlpDocumentAnalysis nlp_analysis = 14;
  // ACL context for security filtering — opensearch-manager decides how to apply these
  google.protobuf.Struct acl = 15;
  // References to chunk indices that hold this document's vectors
  repeated ChunkIndexReference chunk_indices = 16;
}

// Reference to a chunk index that holds vectors for a specific chunking strategy.
message ChunkIndexReference {
  string index_name = 1;
  string chunk_config_id = 2;
  int32 chunk_count = 3;
  repeated string embedding_models = 4;
}

// Flat chunk document for CHUNK_COMBINED and SEPARATE_INDICES strategies.
// Each row represents one chunk with denormalized parent metadata for
// filterability without joins back to the base document.
message OpenSearchChunkDocument {
  // Parent document reference
  string doc_id = 1;
  string title = 2;
  optional string source_uri = 3;
  string doc_type = 4;
  // ACL context (denormalized from parent for security filtering)
  google.protobuf.Struct acl = 5;
  // Chunk identity
  string source_field = 6;
  string chunk_config_id = 7;
  int32 chunk_index = 8;
  string source_text = 9;
  bool is_primary = 10;
  // Position in source document
  optional int32 char_start_offset = 11;
  optional int32 char_end_offset = 12;
  optional string sentence_id = 13;
  optional string paragraph_id = 14;
  // Per-chunk analytics
  optional ai.pipestream.data.v1.ChunkAnalytics chunk_analytics = 15;
  // Embedding vectors keyed by embedding model ID.
  // CHUNK_COMBINED: multiple entries (one per model)
  // SEPARATE_INDICES: single entry
  map<string, FloatVector> embeddings = 16;
}

// A vector of float values. Used as map values since protobuf maps
// cannot directly contain repeated fields.
message FloatVector {
  repeated float values = 1;
}
