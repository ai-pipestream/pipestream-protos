syntax = "proto3";

package ai.pipestream.connector.s3.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "S3ConnectorControlProto";
option java_package = "ai.pipestream.connector.s3.v1";

// S3 connector control surface for unmanaged connectors.
service S3ConnectorControlService {
  // Trigger a crawl for a bucket/prefix.
  rpc StartCrawl(StartCrawlRequest) returns (StartCrawlResponse);
  // Test connectivity and optionally count documents in a bucket.
  rpc TestBucketCrawl(TestBucketCrawlRequest) returns (TestBucketCrawlResponse);
  // Stream all file locations in a bucket/prefix. Terminates after listing is complete.
  // Use for discovering files before triggering a crawl, or for E2E test orchestration.
  rpc StreamFileLocations(StreamFileLocationsRequest) returns (stream StreamFileLocationsResponse);
  // Upload a file to an S3 bucket. Used by E2E tests to seed test data.
  rpc UploadTestFile(UploadTestFileRequest) returns (UploadTestFileResponse);
  // Delete a file from an S3 bucket. Used by E2E tests to clean up seeded data.
  rpc DeleteTestFile(DeleteTestFileRequest) returns (DeleteTestFileResponse);
}

message StartCrawlRequest {
  // DataSource identifier (required).
  string datasource_id = 1;
  // S3 connection configuration (required).
  S3ConnectionConfig connection_config = 2;
  // Optional bucket override (if empty, use connector config).
  string bucket = 3;
  // Optional prefix override (if empty, use connector config).
  string prefix = 4;
  // Client-provided request identifier (for idempotency).
  string request_id = 5;
  // Optional API key for authenticating with the connector admin service.
  string api_key = 6;
}

message StartCrawlResponse {
  bool accepted = 1;
  string message = 2;
  string request_id = 3;
  google.protobuf.Timestamp accepted_at = 4;
}

// S3 connection configuration (reusable for test and registered datasources).
message S3ConnectionConfig {
  // AWS region (e.g., "us-east-1", "eu-west-1"). Defaults to "us-east-1".
  string region = 1;
  // Credentials type: "anonymous" (public buckets) or "static" (access key/secret).
  string credentials_type = 2;
  // AWS access key ID (required if credentials_type is "static").
  // Can be provided directly or via kms_access_key_ref.
  string access_key_id = 3;
  // AWS secret access key (required if credentials_type is "static").
  // Can be provided directly or via kms_secret_key_ref.
  string secret_access_key = 4;
  // Custom S3 endpoint (e.g., for MinIO: "http://localhost:9000").
  string endpoint_override = 5;
  // Path-style access (set true for MinIO, false for AWS S3).
  bool path_style_access = 6;
  // KMS reference for API key (separate service entry in KMS).
  string kms_api_key_ref = 7;
  // KMS reference for S3 access key ID (alternative to direct access_key_id).
  string kms_access_key_ref = 8;
  // KMS reference for S3 secret access key (alternative to direct secret_access_key).
  string kms_secret_key_ref = 9;
}

// Request to test bucket connectivity and optionally count documents.
message TestBucketCrawlRequest {
  // S3 connection configuration.
  S3ConnectionConfig connection_config = 1;
  // Bucket name (required).
  string bucket = 2;
  // Optional prefix filter.
  string prefix = 3;
  // Dry run mode: count documents without emitting events.
  bool dry_run = 4;
  // Maximum number of objects to sample (0 for all, default 100).
  int32 max_sample = 5;
}

// Response from bucket crawl test.
message TestBucketCrawlResponse {
  // Whether the S3 connection and bucket access succeeded.
  bool success = 1;
  // Error message (if success is false).
  string error_message = 2;
  // Total number of objects found (if dry_run is true).
  int64 total_objects = 3;
  // Sample of object keys found (limited by max_sample).
  repeated string sample_object_keys = 4;
  // Test completion timestamp.
  google.protobuf.Timestamp tested_at = 5;
}

// Request to stream all file locations in a bucket/prefix.
message StreamFileLocationsRequest {
  // S3 connection configuration.
  S3ConnectionConfig connection_config = 1;
  // Bucket name (required).
  string bucket = 2;
  // Optional prefix filter (e.g., "dpbench/pdfs/").
  string prefix = 3;
  // Optional file extension filter (e.g., ".pdf", ".txt"). Empty means all files.
  string extension_filter = 4;
  // Maximum number of files to return (0 for unlimited).
  int32 max_files = 5;
}

// Streamed response wrapping a file location.
message StreamFileLocationsResponse {
  // The file location data.
  S3FileLocation file = 1;
}

// A single file in an S3 bucket.
message S3FileLocation {
  // Full object key (e.g., "dpbench/pdfs/doc_001.pdf").
  string key = 1;
  // File size in bytes.
  int64 size_bytes = 2;
  // Last modified timestamp.
  google.protobuf.Timestamp last_modified = 3;
  // Derived filename from the key (e.g., "doc_001.pdf").
  string filename = 4;
  // MIME type inferred from extension (e.g., "application/pdf").
  string content_type = 5;
  // Full S3 URI (e.g., "s3://docling/dpbench/pdfs/doc_001.pdf").
  string source_url = 6;
}

// Request to upload a test file to an S3 bucket.
// Used by E2E tests to seed data into a bucket before triggering a crawl.
message UploadTestFileRequest {
  // S3 connection configuration.
  S3ConnectionConfig connection_config = 1;
  // Bucket name (required).
  string bucket = 2;
  // Object key to write (e.g., "test-data/doc_001.pdf").
  string key = 3;
  // Raw file bytes to upload.
  bytes content = 4;
  // MIME type of the content (e.g., "application/pdf", "text/plain").
  string content_type = 5;
}

// Response from uploading a test file.
message UploadTestFileResponse {
  // Whether the upload succeeded.
  bool success = 1;
  // Error message (if success is false).
  string error_message = 2;
  // ETag of the uploaded object as returned by S3.
  string etag = 3;
  // Number of bytes written.
  int64 size_bytes = 4;
}

// Request to delete a test file from an S3 bucket.
// Used by E2E tests to clean up seeded test data after a crawl.
message DeleteTestFileRequest {
  // S3 connection configuration.
  S3ConnectionConfig connection_config = 1;
  // Bucket name (required).
  string bucket = 2;
  // Object key to delete (e.g., "test-data/doc_001.pdf").
  string key = 3;
}

// Response from deleting a test file.
message DeleteTestFileResponse {
  // Whether the deletion succeeded.
  bool success = 1;
  // Error message (if success is false).
  string error_message = 2;
}
