syntax = "proto3";

package ai.pipestream.connector.jdbc.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "JdbcCrawlEventsProto";
option java_package = "ai.pipestream.connector.jdbc.v1";

// Crawl mode for the JDBC connector.
enum JdbcCrawlMode {
  JDBC_CRAWL_MODE_UNSPECIFIED = 0;
  JDBC_CRAWL_MODE_POLLING = 1;
  JDBC_CRAWL_MODE_LIVE = 2;
}

// Source classification for a crawl job.
enum JdbcCrawlSource {
  JDBC_CRAWL_SOURCE_UNSPECIFIED = 0;
  JDBC_CRAWL_SOURCE_INITIAL = 1;
  JDBC_CRAWL_SOURCE_INCREMENTAL = 2;
  JDBC_CRAWL_SOURCE_LIVE = 3;
}

// Status of a crawl job.
enum JdbcCrawlJobStatus {
  JDBC_CRAWL_JOB_STATUS_UNSPECIFIED = 0;
  JDBC_CRAWL_JOB_STATUS_COMPLETED = 1;
  JDBC_CRAWL_JOB_STATUS_FAILED = 2;
}

// Event type for crawl status messages.
enum JdbcCrawlEventType {
  JDBC_CRAWL_EVENT_TYPE_UNSPECIFIED = 0;
  JDBC_CRAWL_EVENT_TYPE_COMPLETION = 1;
  JDBC_CRAWL_EVENT_TYPE_DELETE = 2;
}

// Published to jdbc-crawl-triggers topic.
// External start requests from gRPC or future CDC.
message JdbcCrawlTrigger {
  string trigger_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string datasource_id = 3;
  string crawl_name = 4;
  JdbcCrawlMode crawl_mode = 5;
  int32 fan_out_count = 6;
  string api_key = 7;
  string request_id = 8;
}

// Published to jdbc-crawl-jobs topic.
// Fan-out sub-crawl assignments.
message JdbcCrawlJob {
  string job_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string datasource_id = 3;
  string crawl_name = 4;
  JdbcCrawlMode crawl_mode = 5;
  int32 sub_crawl_index = 6;
  int32 total_sub_crawls = 7;
  int32 hash_modulus = 8;
  int32 hash_remainder = 9;
  JdbcCrawlSource crawl_source = 10;
  string api_key = 11;
}

// Published to jdbc-crawl-status topic.
// Completion events, delete events.
message JdbcCrawlStatus {
  string job_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string datasource_id = 3;
  string crawl_name = 4;
  int32 sub_crawl_index = 5;
  JdbcCrawlJobStatus status = 6;
  int64 row_count = 7;
  string error_message = 8;
  JdbcCrawlEventType event_type = 9;
  repeated string deleted_doc_ids = 10;
}

// Overall crawl lifecycle phase.
enum JdbcCrawlPhase {
  JDBC_CRAWL_PHASE_UNSPECIFIED = 0;
  JDBC_CRAWL_PHASE_ACCEPTED = 1;
  JDBC_CRAWL_PHASE_DISPATCHING = 2;
  JDBC_CRAWL_PHASE_RUNNING = 3;
  JDBC_CRAWL_PHASE_COMPLETED = 4;
  JDBC_CRAWL_PHASE_FAILED = 5;
}

// gRPC control service for the JDBC connector.
service JdbcConnectorControlService {
  // Trigger a crawl for a named crawl definition.
  rpc StartCrawl(StartCrawlRequest) returns (StartCrawlResponse);

  // Server-streaming: subscribe to live crawl status updates.
  // The stream emits an update whenever a sub-crawl completes/fails,
  // a delete event fires, or the overall crawl finishes.
  rpc StreamCrawlStatus(StreamCrawlStatusRequest) returns (stream StreamCrawlStatusResponse);

  // Unary: get current snapshot of a crawl's progress.
  rpc GetCrawlStatus(GetCrawlStatusRequest) returns (GetCrawlStatusResponse);

  // Unary: list all active (in-progress) crawls.
  rpc ListActiveCrawls(ListActiveCrawlsRequest) returns (ListActiveCrawlsResponse);

  // Create or update a crawl definition at runtime.
  rpc CreateCrawlDefinition(CreateCrawlDefinitionRequest) returns (CreateCrawlDefinitionResponse);

  // Delete a crawl definition by name.
  rpc DeleteCrawlDefinition(DeleteCrawlDefinitionRequest) returns (DeleteCrawlDefinitionResponse);

  // List all crawl definitions (config-seeded and runtime-created).
  rpc ListCrawlDefinitions(ListCrawlDefinitionsRequest) returns (ListCrawlDefinitionsResponse);

  // Delete all crawl definitions whose crawl_name starts with the given prefix.
  // Intended for cleaning up test data (e.g., prefix = "e2e-").
  rpc CleanupTestCrawls(CleanupTestCrawlsRequest) returns (CleanupTestCrawlsResponse);
}

// --- StartCrawl ---

message StartCrawlRequest {
  // Crawl name matching a configured crawl definition (required).
  string crawl_name = 1;
  // Crawl mode override (optional, defaults to config value).
  JdbcCrawlMode crawl_mode = 2;
  // Fan-out count override (optional, defaults to config value).
  int32 fan_out_count = 3;
  // Client-provided request identifier (for idempotency).
  string request_id = 4;
}

message StartCrawlResponse {
  bool accepted = 1;
  string message = 2;
  string request_id = 3;
  string trigger_id = 4;
  google.protobuf.Timestamp accepted_at = 5;
}

// --- StreamCrawlStatus ---

message StreamCrawlStatusRequest {
  // Optional filter: only stream updates for this trigger.
  string trigger_id = 1;
  // Optional filter: only stream updates for this crawl name.
  string crawl_name = 2;
}

// Streamed to the client whenever progress changes.
message StreamCrawlStatusResponse {
  string trigger_id = 1;
  string crawl_name = 2;
  string datasource_id = 3;
  JdbcCrawlPhase phase = 4;

  // Sub-crawl detail (set when a sub-crawl completes/fails).
  int32 sub_crawl_index = 5;
  int32 total_sub_crawls = 6;
  JdbcCrawlJobStatus sub_crawl_status = 7;
  int64 sub_crawl_row_count = 8;
  string error_message = 9;

  // Running totals.
  int32 completed_sub_crawls = 10;
  int32 failed_sub_crawls = 11;
  int64 total_row_count = 12;

  // For delete events.
  JdbcCrawlEventType event_type = 13;
  int32 deleted_doc_count = 14;

  google.protobuf.Timestamp timestamp = 15;
}

// --- GetCrawlStatus ---

message GetCrawlStatusRequest {
  // Look up by trigger ID.
  string trigger_id = 1;
}

message GetCrawlStatusResponse {
  bool found = 1;
  string trigger_id = 2;
  string crawl_name = 3;
  string datasource_id = 4;
  JdbcCrawlPhase phase = 5;
  int32 total_sub_crawls = 6;
  int32 completed_sub_crawls = 7;
  int32 failed_sub_crawls = 8;
  int64 total_row_count = 9;
  google.protobuf.Timestamp started_at = 10;
  repeated SubCrawlSnapshot sub_crawls = 11;
}

message SubCrawlSnapshot {
  int32 sub_crawl_index = 1;
  JdbcCrawlJobStatus status = 2;
  int64 row_count = 3;
  string error_message = 4;
}

// --- ListActiveCrawls ---

message ListActiveCrawlsRequest {
  // Optional filter by crawl name.
  string crawl_name = 1;
}

message ListActiveCrawlsResponse {
  repeated GetCrawlStatusResponse crawls = 1;
}

// --- CreateCrawlDefinition ---

// Creates or updates a crawl definition at runtime.
// Stored in the connector's own database alongside config-seeded definitions.
message CreateCrawlDefinitionRequest {
  // Unique crawl name (used to start/reference the crawl).
  string crawl_name = 1;

  // SQL query returning PipeDoc rows. Use _ps_ column aliases.
  // Use ? placeholder for watermark in incremental mode.
  string parent_query = 2;

  // Optional child SQL query executed per parent row.
  // Use ? placeholder for parent's _ps_doc_id.
  string child_query = 3;

  // Datasource ID for intake authentication (from connector-admin).
  string datasource_id = 4;

  // API key for intake authentication.
  // Prefer x-api-key gRPC header; falls back to this field for programmatic clients.
  string api_key = 5;

  // Target database JDBC URL. If empty, uses the connector's default target.
  string target_jdbc_url = 6;

  // Target database username. If empty, uses the connector's default target.
  string target_username = 7;

  // Target database password. If empty, uses the connector's default target.
  string target_password = 8;

  // Source table name for provenance tracking.
  string source_table = 9;

  // Poll interval in seconds (0 = one-shot only).
  int32 poll_interval_seconds = 10;

  // Delimiter for multi-value _ps_ fields (default: ",").
  string delimiter = 11;

  // Max rows per batch (default: 500).
  int32 batch_size = 12;

  // Max child rows per parent (default: 1000).
  int32 max_children_per_parent = 13;

  // Fan-out count (0 = no fan-out).
  int32 fan_out_count = 14;

  // Whether the crawl is enabled (default: true).
  bool enabled = 15;

  // Crawl mode: "polling" or "live".
  string crawl_mode = 16;
}

message CreateCrawlDefinitionResponse {
  bool success = 1;
  string message = 2;
  string crawl_name = 3;
}

// --- DeleteCrawlDefinition ---

message DeleteCrawlDefinitionRequest {
  string crawl_name = 1;
}

message DeleteCrawlDefinitionResponse {
  bool success = 1;
  string message = 2;
}

// --- ListCrawlDefinitions ---

message ListCrawlDefinitionsRequest {}

message ListCrawlDefinitionsResponse {
  repeated CrawlDefinitionInfo definitions = 1;
}

message CrawlDefinitionInfo {
  string crawl_name = 1;
  string parent_query = 2;
  string child_query = 3;
  string datasource_id = 4;
  string source_table = 5;
  int32 poll_interval_seconds = 6;
  bool enabled = 7;
  string crawl_mode = 8;
  bool seeded_from_config = 9;
  string status = 10;
}

// --- CleanupTestCrawls ---

message CleanupTestCrawlsRequest {
  // Prefix to match against crawl_name (e.g., "e2e-" or "test-").
  // All crawl definitions whose name starts with this prefix will be deleted.
  string crawl_name_prefix = 1;
  // If true, also delete the associated datasources via connector-admin.
  bool delete_datasources = 2;
}

message CleanupTestCrawlsResponse {
  bool success = 1;
  string message = 2;
  // Number of crawl definitions deleted.
  int32 crawls_deleted = 3;
  // Number of datasources deleted (if delete_datasources was true).
  int32 datasources_deleted = 4;
  // Names of deleted crawl definitions.
  repeated string deleted_crawl_names = 5;
}
