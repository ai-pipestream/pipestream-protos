syntax = "proto3";

package ai.pipestream.testing.harness.v1;

import "ai/pipestream/connector/s3/v1/s3_connector_control.proto";
import "ai/pipestream/data/module/v1/module_service.proto";
import "ai/pipestream/data/v1/pipeline_core_types.proto";
import "ai/pipestream/opensearch/v1/opensearch_manager.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "ModuleTestingSidecarServiceProto";
option java_package = "ai.pipestream.testing.harness.v1";

service ModuleTestingSidecarService {
  // Executes a single module test call with either uploaded file input or repository input.
  rpc RunModuleTest(RunModuleTestRequest) returns (RunModuleTestResponse);

  // Executes a full end-to-end pipeline test.
  // Creates account → graph → datasource → uploads document(s) → polls OpenSearch → cleans up.
  // Streams status updates per step so the client can display progress in real time.
  rpc RunE2EPipelineTest(RunE2EPipelineTestRequest) returns (stream RunE2EPipelineTestResponse);

  // Executes a JDBC crawl end-to-end test.
  // Creates account → graph → configs → datasource → bind → triggers JDBC crawl →
  // streams crawl progress → polls OpenSearch for expected count → verifies sample → cleans up.
  rpc RunJdbcCrawlTest(RunJdbcCrawlTestRequest) returns (stream RunJdbcCrawlTestResponse);

  // Executes an S3 crawl end-to-end test.
  // Optionally seeds test data → creates account → graph → datasource → bind →
  // triggers S3 crawl → streams crawl progress → polls OpenSearch for expected count →
  // verifies sample → cleans up seeded files → cleans up resources.
  rpc RunS3CrawlTest(RunS3CrawlTestRequest) returns (stream RunS3CrawlTestResponse);

  // Executes a transport-layer test that validates document routing without
  // heavyweight processing. Uses ECHO modules as pass-through hops and the
  // sidecar's own test-processor as the terminal counter.
  //
  // Routing test graph:  ECHO-1 → ECHO-2 → SIDECAR
  // Parser test graph:   PARSER → ECHO → SIDECAR
  //
  // Streams step-by-step progress and reports per-node document counts.
  rpc RunTransportTest(RunTransportTestRequest) returns (stream RunTransportTestResponse);
}

// Unified pipeline-crawl service that supersedes the per-source legacy RPCs
// on {@link ModuleTestingSidecarService} (RunE2EPipelineTest /
// RunJdbcCrawlTest / RunS3CrawlTest / RunTransportTest). Lives on its own
// service so the implementation can use plain async gRPC stubs +
// virtual-thread blocking I/O without Mutiny — the legacy service stays
// Mutiny-bound for backwards compatibility and is untouched.
//
// The caller picks:
//   1. A {@code PipelineSource} (single doc, JDBC, or S3) plus its
//      source-specific config.
//   2. A set of {@code PipelineStep}s to include in the graph (Parser,
//      Chunker, Embedder, Semantic-graph, OpenSearch-sink). Auto-cascades
//      upstream dependencies (Semantic implies Chunker+Embedder, etc).
//   3. A {@code E2ETransportType} (gRPC / Kafka / Redis) for inter-step
//      edges.
//   4. A subset of {@code observe_steps} for which the testing-sidecar
//      runs a rich collector (per-step latency histogram, doc-id ring
//      buffer, error trail). Always-on counts are free; rich mode is
//      opt-in.
//
// The sidecar is wired as a fan-out tap on every step in the graph so the
// FE can render per-step progress without a separate observation pipeline.
// When OpenSearch-sink is NOT in the step list, the LAST main-flow step's
// tap is the graph terminal — same effect as the legacy "no OS" pipeline
// shapes but without exposing that detail in the UI.
service PipelineCrawlerService {
  rpc RunPipelineCrawl(RunPipelineCrawlRequest) returns (stream RunPipelineCrawlResponse);
}

// =====================================================================
// E2E Pipeline Test
// =====================================================================

// How the document enters the pipeline.
enum E2EIntakeMode {
  E2E_INTAKE_MODE_UNSPECIFIED = 0;
  // Use gRPC UploadBlob to connector-intake-service.
  E2E_INTAKE_MODE_GRPC = 1;
  // Use HTTP POST /uploads/raw to connector-intake-service.
  E2E_INTAKE_MODE_HTTP = 2;
}

// Transport type for edges between pipeline nodes.
enum E2ETransportType {
  E2E_TRANSPORT_TYPE_UNSPECIFIED = 0;
  // Direct gRPC calls between nodes (engine calls modules directly).
  E2E_TRANSPORT_TYPE_GRPC = 1;
  // Kafka messaging (engine saves to S3, publishes reference to Kafka,
  // sidecar hydrates and calls processNode). This is the production path.
  E2E_TRANSPORT_TYPE_KAFKA = 2;
  // Redis-stream queue between nodes. Sidecar XADDs to a per-edge stream;
  // a consumer-group consumer drains it and calls the target module via
  // sync gRPC. No s3 backing — unacked entries recover via XPENDING.
  // Use for async pacing in front of slow consumers; queue depth IS the
  // backpressure signal.
  E2E_TRANSPORT_TYPE_REDIS = 3;
}

// Request to run a full end-to-end pipeline test.
message RunE2EPipelineTestRequest {
  // Sample document names from the sidecar's built-in sample-data directory.
  // e.g., ["constitution.txt", "irs_f1040.pdf"]
  // If empty, defaults to a single small text document.
  repeated string sample_names = 1;

  // Or upload custom documents (takes precedence over sample_names).
  repeated UploadInput uploads = 2;

  // How the document enters the pipeline.
  E2EIntakeMode intake_mode = 3;

  // Optional: use an existing account instead of creating one.
  // If empty, a temporary account is created and cleaned up after.
  optional string account_id = 4;

  // Whether to clean up all created resources after the test.
  // Default: true. Set to false to inspect resources after the test.
  bool skip_cleanup = 5;

  // Maximum seconds to wait for the document to appear in OpenSearch.
  // Default: 60.
  optional int32 polling_timeout_seconds = 6;

  // Optional: semantic manager configuration override.
  // If not set, the default pipeline config is used.
  optional google.protobuf.Struct semantic_config = 7;

  // Transport type for edges between pipeline nodes.
  // Default: GRPC (direct calls). Set to KAFKA to test the production
  // path with S3 storage, Kafka pub/sub, and sidecar hydration.
  E2ETransportType transport_type = 8;

  // Whether to include a semantic chunking directive alongside standard chunking.
  // When true, adds a SEMANTIC algorithm directive that uses sentence-level
  // embedding similarity for topic boundary detection, plus centroid vectors.
  bool include_semantic_chunking = 9;

  // OpenSearch index creation settings for vector chunk indices.
  optional OpenSearchIndexSettings opensearch_settings = 10;

  // OpenSearch bulk indexing queue configuration for this test run.
  // If set, calls UpdateBulkConfig on opensearch-manager before the test starts.
  optional ai.pipestream.opensearch.v1.BulkIndexingConfig bulk_indexing = 11;

  // Number of Kafka partitions for graph node processing topics.
  // Only relevant when transport_type = KAFKA.
  int32 kafka_partitions = 12;
}

// Streamed response for each step of the E2E pipeline test.
message RunE2EPipelineTestResponse {
  // Step identifier (from the static step list).
  string step_id = 1;

  // Human-readable step name.
  string step_name = 2;

  // Step number (1-based, for progress display).
  int32 step_number = 3;

  // Total number of steps in this test run.
  int32 total_steps = 4;

  // Step outcome.
  E2EStepOutcome outcome = 5;

  // Human-readable message (success detail or error description).
  string message = 6;

  // Time taken for this step in milliseconds.
  int64 duration_ms = 7;

  // Step-specific details (e.g., account_id, doc_id, chunk_count, vector_dims).
  google.protobuf.Struct details = 8;

  // Log entries from this step (module logs, engine logs).
  repeated ai.pipestream.data.v1.LogEntry log_entries = 9;

  // When this status was emitted.
  google.protobuf.Timestamp timestamp = 10;
}

// Streamed response for each step of the JDBC crawl test.
// Same structure as RunE2EPipelineTestResponse; separate type for buf lint compliance.
message RunJdbcCrawlTestResponse {
  string step_id = 1;
  string step_name = 2;
  int32 step_number = 3;
  int32 total_steps = 4;
  E2EStepOutcome outcome = 5;
  string message = 6;
  int64 duration_ms = 7;
  google.protobuf.Struct details = 8;
  repeated ai.pipestream.data.v1.LogEntry log_entries = 9;
  google.protobuf.Timestamp timestamp = 10;
}

// =====================================================================
// JDBC Crawl Test
// =====================================================================

// Request to run a JDBC crawl end-to-end test.
message RunJdbcCrawlTestRequest {
  // Crawl definition name matching jdbc-connector config (e.g., "opinions").
  string crawl_name = 1;

  // Expected document count in OpenSearch after crawl completes.
  // The poll step waits until this many documents are indexed.
  int32 expected_doc_count = 2;

  // Optional: use an existing account instead of creating one.
  optional string account_id = 3;

  // Whether to clean up all created resources after the test.
  bool skip_cleanup = 4;

  // Max seconds to wait for crawl completion + OpenSearch indexing.
  // Default: 300 (5 minutes for large crawls).
  optional int32 polling_timeout_seconds = 5;

  // Transport type for graph edges.
  E2ETransportType transport_type = 6;

  // OpenSearch index name for the crawled documents.
  // If empty, defaults to "test-jdbc-{account_id}".
  optional string index_name = 7;

  // Number of sample documents to verify after indexing.
  // Default: 5. Each sample is checked for title, body, and vectors.
  optional int32 verify_sample_count = 8;

  // External DB support: when true, uses jdbc_url/username/password instead of local test DB.
  // The jdbc-connector datasource config is registered via REST API at runtime.
  bool use_external_db = 9;

  // JDBC connection URL for external DB (e.g., "jdbc:postgresql://host:5433/courtlistener?sslmode=require").
  // Only used when use_external_db is true.
  optional string jdbc_url = 10;

  // Username for external DB connection.
  optional string jdbc_username = 11;

  // Password for external DB connection.
  optional string jdbc_password = 12;

  // Maximum number of parent documents to crawl. Appended as LIMIT to parent query.
  // 0 or unset = unlimited (crawl entire table).
  optional int32 max_documents = 13;

  // Optional: semantic manager configuration override.
  // If not set, the default 2x2 matrix config is used.
  optional google.protobuf.Struct semantic_config = 14;

  // Whether to include a semantic chunking directive alongside standard chunking.
  // When true, adds a SEMANTIC algorithm directive that uses sentence-level
  // embedding similarity for topic boundary detection, plus centroid vectors.
  bool include_semantic_chunking = 15;

  // OpenSearch index creation settings for vector chunk indices.
  // Controls shards, replicas, refresh interval, and HNSW parameters.
  // If not set, opensearch-manager defaults apply (from application.properties).
  optional OpenSearchIndexSettings opensearch_settings = 16;

  // OpenSearch bulk indexing queue configuration for this test run.
  // If set, calls UpdateBulkConfig on opensearch-manager before the crawl starts.
  // Controls queue count, capacity, and flush interval for the draining queue system.
  optional ai.pipestream.opensearch.v1.BulkIndexingConfig bulk_indexing = 17;

  // Number of Kafka partitions for graph node processing topics.
  // Only relevant when transport_type = KAFKA. Applied to all graph nodes created by the test.
  // If 0 or unset, uses the engine default (pipestream.kafka.default-partitions, default 4).
  int32 kafka_partitions = 18;
}

// OpenSearch index creation settings for performance tuning.
// See: https://docs.opensearch.org/latest/vector-search/performance-tuning-indexing/
message OpenSearchIndexSettings {
  // Number of primary shards for chunk indices. More = parallel HNSW construction. Default: 8.
  optional int32 number_of_shards = 1;

  // Number of replicas. 0 during bulk indexing avoids duplicate HNSW graph construction.
  optional int32 number_of_replicas = 2;

  // Refresh interval. "-1" disables during bulk indexing to avoid tiny segments. Default: "-1".
  optional string refresh_interval = 3;

  // HNSW ef_construction: graph build quality. Lower = faster indexing. Default: 100.
  optional int32 ef_construction = 4;

  // HNSW m: bidirectional links per node. Default: 16.
  optional int32 hnsw_m = 5;
}

// =====================================================================
// S3 Crawl Test
// =====================================================================

// Request to run an S3 crawl end-to-end test.
message RunS3CrawlTestRequest {
  // S3 connection configuration for the bucket to crawl.
  ai.pipestream.connector.s3.v1.S3ConnectionConfig connection_config = 1;

  // Bucket name to crawl (required).
  string bucket = 2;

  // Optional prefix filter within the bucket (e.g., "test-data/").
  string prefix = 3;

  // If true, the test will upload sample documents to the bucket before crawling
  // and delete them after (unless skip_cleanup is set).
  bool hydrate_sample_data = 4;

  // Whether to skip cleanup of created resources (account, graph, datasource) and
  // seeded files after the test. Default: false.
  bool skip_cleanup = 5;

  // Max seconds to wait for crawl completion + OpenSearch indexing.
  // Default: 300 (5 minutes).
  optional int32 polling_timeout_seconds = 6;

  // Transport type for graph edges.
  E2ETransportType transport_type = 7;

  // Optional: use an existing account instead of creating one.
  optional string account_id = 8;

  // OpenSearch index name for the crawled documents.
  // If empty, defaults to "test-s3-{account_id}".
  optional string index_name = 9;

  // Expected number of documents in OpenSearch after crawl completes.
  // The poll step waits until this many documents are indexed.
  optional int32 expected_doc_count = 10;

  // Optional: semantic manager configuration override.
  // If not set, the default 2x2 matrix config is used.
  optional google.protobuf.Struct semantic_config = 11;

  // Whether to include a semantic chunking directive alongside standard chunking.
  // When true, adds a SEMANTIC algorithm directive that uses sentence-level
  // embedding similarity for topic boundary detection, plus centroid vectors.
  bool include_semantic_chunking = 12;

  // OpenSearch index creation settings for vector chunk indices.
  // Controls shards, replicas, refresh interval, and HNSW parameters.
  optional OpenSearchIndexSettings opensearch_settings = 13;

  // OpenSearch bulk indexing queue configuration for this test run.
  // If set, calls UpdateBulkConfig on opensearch-manager before the crawl starts.
  optional ai.pipestream.opensearch.v1.BulkIndexingConfig bulk_indexing = 14;

  // Number of Kafka partitions for graph node processing topics.
  // Only relevant when transport_type = KAFKA.
  int32 kafka_partitions = 15;
}

// Streamed response for each step of the S3 crawl test.
// Same structure as RunE2EPipelineTestResponse; separate type for buf lint compliance.
message RunS3CrawlTestResponse {
  // Step identifier (from the static step list).
  string step_id = 1;

  // Human-readable step name.
  string step_name = 2;

  // Step number (1-based, for progress display).
  int32 step_number = 3;

  // Total number of steps in this test run.
  int32 total_steps = 4;

  // Step outcome.
  E2EStepOutcome outcome = 5;

  // Human-readable message (success detail or error description).
  string message = 6;

  // Time taken for this step in milliseconds.
  int64 duration_ms = 7;

  // Step-specific details (e.g., account_id, doc_count, crawl_id).
  google.protobuf.Struct details = 8;

  // Log entries from this step (module logs, engine logs).
  repeated ai.pipestream.data.v1.LogEntry log_entries = 9;

  // When this status was emitted.
  google.protobuf.Timestamp timestamp = 10;
}

// Outcome of a single E2E step.
enum E2EStepOutcome {
  E2E_STEP_OUTCOME_UNSPECIFIED = 0;
  // Step is starting (streamed before execution).
  E2E_STEP_OUTCOME_STARTED = 1;
  // Step completed successfully.
  E2E_STEP_OUTCOME_SUCCESS = 2;
  // Step failed (test may continue or abort depending on step).
  E2E_STEP_OUTCOME_FAILED = 3;
  // Step was skipped (e.g., cleanup skipped when skip_cleanup=true).
  E2E_STEP_OUTCOME_SKIPPED = 4;
}

message RunModuleTestRequest {
  // Logical module service name to call (e.g. parser module name from registration).
  string module_name = 1;

  // One of the supported input sources.
  oneof input {
    UploadInput upload = 2;
    RepositoryInput repository = 3;
  }

  // Module configuration payload (JSON Schema-compatible).
  google.protobuf.Struct module_config = 4;

  // Optional execution context for module logging/auditing.
  ServiceContext context = 5;

  // Logical account identifier for authorization/auditing.
  string account_id = 6;

  // Request the service to include output_doc on success.
  bool include_output_doc = 7;
}

message ServiceContext {
  string pipeline_name = 1;
  string pipe_step_name = 2;
  string stream_id = 3;
  int64 current_hop_number = 4;
  map<string, string> context_params = 5;
}

message UploadInput {
  string filename = 1;
  string mime_type = 2;
  bytes file_data = 3;
}

message RepositoryInput {
  // Repository node id from repository service.
  string repository_node_id = 1;

  // Optional drive hint passed through when listing documents.
  string drive = 2;

  // If true, fetches inline bytes for storage-ref blobs prior to invocation.
  bool hydrate_blob_from_storage = 3;
}

message RunModuleTestResponse {
  bool success = 1;
  string message = 2;
  int64 duration_ms = 3;

  // Optional output document from module processing.
  ai.pipestream.data.v1.PipeDoc output_doc = 4;

  // Structured log entries from the module call.
  repeated ai.pipestream.data.v1.LogEntry log_entries = 14;

  reserved 5;
  reserved "processor_logs";

  // Summaries to support lightweight UI rendering.
  google.protobuf.Struct input_summary = 6;
  google.protobuf.Struct output_summary = 7;

  // Full process data response for advanced consumers.
  ai.pipestream.data.module.v1.ProcessDataResponse process_data_response = 8;

  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp completed_at = 10;
  int64 elapsed_ms = 11;
  string error_code = 12;
  repeated string errors = 13;
}

// =====================================================================
// Transport Test
// =====================================================================

// Type of transport test to execute.
enum TransportTestType {
  TRANSPORT_TEST_TYPE_UNSPECIFIED = 0;
  // Engine routing test: ECHO-1 → ECHO-2 → SIDECAR.
  // Pure routing — no parsing, no semantic processing, no indexing.
  TRANSPORT_TEST_TYPE_ROUTING = 1;
  // Parser transport test: PARSER → ECHO → SIDECAR.
  // Validates parsing + routing for binary files (S3 only).
  TRANSPORT_TEST_TYPE_PARSER = 2;
}

// Connector type for the transport test data source.
enum TransportTestConnectorType {
  TRANSPORT_TEST_CONNECTOR_TYPE_UNSPECIFIED = 0;
  // JDBC connector — crawls rows from a relational database.
  TRANSPORT_TEST_CONNECTOR_TYPE_JDBC = 1;
  // S3 connector — crawls objects from an S3-compatible bucket.
  TRANSPORT_TEST_CONNECTOR_TYPE_S3 = 2;
}

// Request to run a transport-layer validation test.
// Tests document routing through ECHO hops to the sidecar's own test-processor,
// which counts received documents in-process for exact validation.
message RunTransportTestRequest {
  // Which test topology to use.
  TransportTestType test_type = 1;

  // Which connector feeds documents into the pipeline.
  // ROUTING test supports both JDBC and S3.
  // PARSER test requires S3 (binary files need parsing).
  TransportTestConnectorType connector_type = 2;

  // Transport type for edges between pipeline nodes.
  E2ETransportType transport_type = 3;

  // Expected number of documents the crawl should produce.
  // The test fails if the sidecar receives fewer than this count.
  int32 expected_doc_count = 4;

  // Max seconds to wait for all documents to arrive at the sidecar.
  // Default: 300 (5 minutes).
  optional int32 polling_timeout_seconds = 5;

  // Whether to skip cleanup of created resources after the test.
  bool skip_cleanup = 6;

  // Optional: use an existing account instead of creating one.
  optional string account_id = 7;

  // ── JDBC connector options (used when connector_type = JDBC) ──

  // Use an external database instead of the local courtlistener_test DB.
  bool use_external_db = 10;

  // JDBC connection URL for external DB.
  optional string jdbc_url = 11;

  // Username for external DB connection.
  optional string jdbc_username = 12;

  // Password for external DB connection.
  optional string jdbc_password = 13;

  // Maximum parent documents to crawl (0 = unlimited).
  optional int32 max_documents = 14;

  // ── S3 connector options (used when connector_type = S3) ──

  // S3 connection configuration (endpoint, region, credentials).
  ai.pipestream.connector.s3.v1.S3ConnectionConfig s3_connection_config = 20;

  // S3 bucket name to crawl.
  string s3_bucket = 21;

  // Optional prefix filter within the bucket.
  string s3_prefix = 22;

  // Upload sample documents to the bucket before crawling.
  bool hydrate_sample_data = 23;
}

// Streamed response for each step of the transport test.
message RunTransportTestResponse {
  // Step identifier.
  string step_id = 1;

  // Human-readable step name.
  string step_name = 2;

  // Step number (1-based).
  int32 step_number = 3;

  // Total steps in this test run.
  int32 total_steps = 4;

  // Step outcome.
  E2EStepOutcome outcome = 5;

  // Human-readable message.
  string message = 6;

  // Duration of this step in milliseconds.
  int64 duration_ms = 7;

  // Step-specific details.
  // For validate_counts, includes per-node document counts:
  //   { "echo-1": { "expected": 1000, "actual": 1000, "pass": true }, ... }
  google.protobuf.Struct details = 8;

  // Log entries from this step.
  repeated ai.pipestream.data.v1.LogEntry log_entries = 9;

  // When this status was emitted.
  google.protobuf.Timestamp timestamp = 10;
}

// =====================================================================
// Unified Pipeline Crawl (RunPipelineCrawl)
// =====================================================================

// Where the documents come from. Drives which connector + intake path the
// graph uses. Single-doc and S3 require Parser; JDBC reads structured rows
// and skips Parser entirely.
enum PipelineSource {
  PIPELINE_SOURCE_UNSPECIFIED = 0;
  // One or more documents uploaded directly to connector-intake (single-shot).
  PIPELINE_SOURCE_SINGLE_DOC = 1;
  // JDBC connector reading rows from a database via a registered crawl
  // definition. Parser is not applicable.
  PIPELINE_SOURCE_JDBC = 2;
  // S3 connector crawling objects from a bucket.
  PIPELINE_SOURCE_S3 = 3;
}

// Steps that may be included in the pipeline graph. Order is fixed
// (Echo → Parser → Chunker → Embedder → Semantic-graph → OpenSearch-sink); the
// caller picks which steps to include and the graph builder cascades
// dependencies (Semantic-graph implies Chunker+Embedder, Embedder implies
// Chunker, etc). Parser is automatically excluded when source is JDBC.
//
// Sidecar observation taps are NOT in this enum because they're plumbing,
// not a step the user opts into directly. Each step the caller marks under
// {@code observe_steps} gets a sidecar fan-out tap added by the graph
// builder as a sibling edge.
enum PipelineStep {
  PIPELINE_STEP_UNSPECIFIED = 0;
  // Pass-through processor used by the test harness to exercise ingress edges.
  PIPELINE_STEP_ECHO = 6;
  // Tika/Docling document parsing. Only valid when source is SINGLE_DOC or S3.
  PIPELINE_STEP_PARSER = 1;
  // Text chunking (token / sentence / semantic algorithms).
  PIPELINE_STEP_CHUNKER = 2;
  // Embedding generation. Implies Chunker upstream.
  PIPELINE_STEP_EMBEDDER = 3;
  // Semantic-graph centroid + boundary computation. Implies Embedder.
  PIPELINE_STEP_SEMANTIC_GRAPH = 4;
  // OpenSearch sink. A terminal testing-sidecar is always appended after the last step.
  PIPELINE_STEP_OPENSEARCH_SINK = 5;
}

// Source-specific configuration. Mirrors the per-source fields from the
// legacy RPCs (RunE2EPipelineTest / RunJdbcCrawlTest / RunS3CrawlTest)
// but factored so the unified RPC can carry whichever variant is relevant.

message SingleDocSourceConfig {
  // Sample document names from the sidecar's built-in sample-data directory.
  // e.g., ["constitution.txt", "irs_f1040.pdf"]. Ignored if {@code uploads}
  // is non-empty.
  repeated string sample_names = 1;
  // Or upload custom documents (takes precedence over sample_names).
  repeated UploadInput uploads = 2;
  // How the document enters the pipeline.
  E2EIntakeMode intake_mode = 3;
}

message JdbcSourceConfig {
  // Use an external database instead of the local courtlistener_test DB.
  bool use_external_db = 1;
  // JDBC connection URL for external DB.
  optional string jdbc_url = 2;
  // Username for external DB connection.
  optional string jdbc_username = 3;
  // Password for external DB connection.
  optional string jdbc_password = 4;
  // Maximum parent documents to crawl (0 = unlimited).
  optional int32 max_documents = 5;
}

message S3SourceConfig {
  // S3 connection configuration (endpoint, region, credentials).
  ai.pipestream.connector.s3.v1.S3ConnectionConfig connection_config = 1;
  // S3 bucket name to crawl.
  string bucket = 2;
  // Optional prefix filter within the bucket.
  string prefix = 3;
  // Upload sample documents to the bucket before crawling.
  bool hydrate_sample_data = 4;
}

// Request to run a unified pipeline crawl.
message RunPipelineCrawlRequest {
  // Where docs come from. Drives the connector + which steps are valid.
  PipelineSource source = 1;

  // Source-specific configuration. The variant set must match {@code source}.
  oneof source_config {
    SingleDocSourceConfig single_doc = 2;
    JdbcSourceConfig jdbc = 3;
    S3SourceConfig s3 = 4;
  }

  // Steps to include in the pipeline graph. The graph builder cascades
  // upstream dependencies and silently skips Parser when source is JDBC.
  // If empty or only Parser is selected, the testing-sidecar is the terminal.
  repeated PipelineStep steps = 5;

  // Subset of {@code steps} for which the sidecar fan-out tap runs in
  // rich-collection mode (per-step latency histogram, doc-id ring buffer,
  // error trail). Steps NOT in this list still get a tap, but only counts.
  repeated PipelineStep observe_steps = 6;

  // Transport for each main-flow edge, in graph order. The graph is built
  // in canonical step order (parser → chunker → embedder → semantic-graph
  // → opensearch-sink) skipping disabled / cascaded-out steps; this list
  // assigns one transport per resulting edge, in the same order.
  //
  // Size MUST equal the number of main-flow edges produced by {@code steps}
  // — the server fails the request loudly if it doesn't, rather than fall
  // back to a default. (No size-1 broadcast convenience: keeps the wire
  // contract honest about which edges got which transport.)
  //
  // Sidecar tap edges always use gRPC regardless, so observation doesn't
  // get queued in Kafka/Redis with production traffic.
  repeated E2ETransportType edge_transports = 7;

  // ── Common config ───────────────────────────────────────────────────

  // Optional: use an existing account instead of creating one.
  optional string account_id = 20;

  // Whether to clean up all created resources after the test.
  bool skip_cleanup = 21;

  // Maximum seconds to wait for the document to appear in OpenSearch
  // (or in the sidecar terminal counter when OS is not in the graph).
  optional int32 polling_timeout_seconds = 22;

  // Optional: semantic-graph configuration override.
  optional google.protobuf.Struct semantic_config = 23;

  // OpenSearch index creation settings for vector chunk indices.
  // Ignored when OPENSEARCH_SINK is not in {@code steps}.
  optional OpenSearchIndexSettings opensearch_settings = 24;

  // OpenSearch bulk indexing queue configuration. Ignored without OS sink.
  optional ai.pipestream.opensearch.v1.BulkIndexingConfig bulk_indexing = 25;

  // Number of Kafka partitions for graph node processing topics.
  // Only relevant when transport = KAFKA.
  int32 kafka_partitions = 26;

  // Whether to include a semantic chunking directive alongside standard
  // chunking. Only meaningful when CHUNKER is in {@code steps}.
  bool include_semantic_chunking = 27;
}

// Per-step observation snapshot, emitted alongside step progress events
// for steps the caller has marked under {@code observe_steps}. Carries the
// rich telemetry the sidecar's TestProcessor collects for the step's
// fan-out tap.
message ObservationSnapshot {
  // Pipeline step this snapshot covers (matches the corresponding step in
  // the request's {@code observe_steps}).
  PipelineStep step = 1;

  // Total docs received at this tap, including duplicates.
  int64 total_count = 2;
  // Distinct doc_ids received.
  int64 unique_count = 3;
  // Number of doc_ids that arrived more than once (each counted once).
  int64 duplicate_count = 4;

  // Throughput over the most recent sliding window (docs/sec).
  double rate_docs_per_sec_recent = 5;
  // Throughput averaged over the entire observation period.
  double rate_docs_per_sec_overall = 6;

  // Per-step service-time latency in milliseconds, derived from
  // {@code dispatched_at_epoch_ms} on incoming requests. Zeroed if no
  // upstream dispatch timestamp was available.
  int64 latency_p50_ms = 7;
  int64 latency_p95_ms = 8;
  int64 latency_p99_ms = 9;
  int64 latency_max_ms = 10;

  // Most recent doc_ids observed at this step, oldest-first. Capped at a
  // small fixed size by the collector.
  repeated string recent_doc_ids = 11;

  // Count of docs that arrived with a failure outcome at this step.
  int64 error_count = 12;
  // Most recent error message observed; empty if none.
  string last_error_message = 13;
}

// Streamed response for each step + observation tick of a pipeline crawl.
// Mirrors the per-step progress shape used by the legacy E2E RPCs (so the
// FE can reuse most of its rendering) and adds an {@code observation}
// field that's populated for steps the caller observes.
message RunPipelineCrawlResponse {
  // Step identifier.
  string step_id = 1;
  // Human-readable step name.
  string step_name = 2;
  // Step number (1-based).
  int32 step_number = 3;
  // Total steps in this run.
  int32 total_steps = 4;
  // Step outcome.
  E2EStepOutcome outcome = 5;
  // Human-readable message.
  string message = 6;
  // Duration of this step in milliseconds.
  int64 duration_ms = 7;
  // Step-specific details (free-form key/value pairs).
  google.protobuf.Struct details = 8;
  // Log entries from this step.
  repeated ai.pipestream.data.v1.LogEntry log_entries = 9;
  // When this status was emitted.
  google.protobuf.Timestamp timestamp = 10;

  // Observation snapshots for steps the caller is observing. Emitted
  // alongside long-running progress events (e.g., the OpenSearch poll
  // loop) so the FE can render live per-step counters / latency.
  // Empty for steps not in the request's {@code observe_steps}.
  repeated ObservationSnapshot observations = 11;
}
