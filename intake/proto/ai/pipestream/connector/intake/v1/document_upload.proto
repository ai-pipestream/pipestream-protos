syntax = "proto3";

package ai.pipestream.connector.intake.v1;

import "ai/pipestream/data/v1/pipeline_core_types.proto";

option java_multiple_files = true;
option java_package = "ai.pipestream.connector.intake.v1";

// Document Upload and Ingestion Support Messages
//
// This file defines the core message structures used for document ingestion,
// chunk-based uploads, and stateful streaming sessions.
//
// Ingestion Architecture:
// ======================
//
// ```mermaid
// graph TD
//     subgraph "Upload Strategies"
//         UNARY[Unary Upload]
//         CHUNK[Chunked Upload]
//         STREAM[Bidi Stream]
//     end
//
//     subgraph "Data Structures"
//         PD[PipeDoc]
//         BLOB[Raw Blob]
//         ITEM[PipeDocItem]
//     end
//
//     subgraph "Identification"
//         REF[DocReference]
//         ID[doc_id]
//         SID[source_doc_id]
//     end
//
//     UNARY --> PD
//     CHUNK --> BLOB
//     STREAM --> ITEM
//     ITEM --> PD
//
//     PD --> ID
//     PD --> SID
//     REF --> ID
//     REF --> SID
// ```

// ============================================
// DOCUMENT UPLOAD SERVICE
// Simple, fast chunk upload - no streaming complexity
// ============================================

// Chunked document upload service for large files.
//
// Provides simple parallel chunk uploads without streaming complexity.
// Supports progress tracking via unary and streaming RPCs.
service DocumentUploadService {
  // Upload a single chunk - can be called in parallel for same file.
  rpc UploadChunk(UploadChunkRequest) returns (UploadChunkResponse);

  // Get upload progress - single snapshot.
  rpc GetUploadProgress(GetUploadProgressRequest) returns (GetUploadProgressResponse);

  // Stream upload progress - real-time updates.
  rpc StreamUploadProgress(StreamUploadProgressRequest) returns (stream StreamUploadProgressResponse);
}

// Upload a single chunk of a file.
// Auth: connector-id and api-key sent in gRPC metadata headers.
message UploadChunkRequest {
  // Identity (connector-id from gRPC metadata).
  string crawl_id = 1; // Which crawl this belongs to.
  string file_id = 2; // Unique identifier for this file.

  // Chunk info.
  int32 chunk_number = 3; // 0-based chunk number.
  int32 total_chunks = 4; // Total chunks (0 if unknown, e.g. streaming from unknown source).
  bytes data = 5; // The actual chunk data.
  bool is_last = 6; // Is this the final chunk? (required when total_chunks=0).

  // File metadata (only needed on first chunk, but can be on all for simplicity).
  string filename = 7;
  string path = 8; // File path/location.
  string mime_type = 9;
  int64 file_size = 10;
  map<string, string> metadata = 11;
}

// Response from uploading a single chunk.
message UploadChunkResponse {
  // File identifier this chunk belongs to.
  string file_id = 1;
  // Chunk number that was uploaded.
  int32 chunk_number = 2;
  // Whether the chunk upload succeeded.
  bool success = 3;
  // Status or error message.
  string message = 4;

  // If is_last=true and all chunks received, this is populated with final result.
  UploadResult result = 5;
}

// Final result of a completed upload.
message UploadResult {
  // File identifier.
  string file_id = 1;
  // S3 object key where file was stored.
  string s3_key = 2;
  // S3 ETag for verification.
  string s3_etag = 3;
  // Total size of the uploaded file in bytes.
  int64 size = 4;
  // SHA256 checksum of the complete file.
  string checksum = 5;
}

// Request to get current upload progress snapshot.
message GetUploadProgressRequest {
  // File identifier to check progress for.
  string file_id = 1;
}

// Response with current upload progress.
message GetUploadProgressResponse {
  // File identifier this chunk belongs to.
  string file_id = 1;
  // Number of chunks received so far.
  int32 chunks_received = 2;
  // Total number of chunks expected (0 if unknown).
  int32 total_chunks = 3;
  // Number of chunks successfully uploaded to S3.
  int32 chunks_uploaded_to_s3 = 4;
  // Whether the upload is complete.
  bool complete = 5;
  // Final result (only populated when complete=true).
  UploadResult result = 6;
}

// Request to stream real-time upload progress updates.
message StreamUploadProgressRequest {
  // File identifier to stream progress for.
  string file_id = 1;
}

// Streaming response with real-time upload progress updates.
message StreamUploadProgressResponse {
  // File identifier this chunk belongs to.
  string file_id = 1;
  // Number of chunks received so far.
  int32 chunks_received = 2;
  // Total number of chunks expected (0 if unknown).
  int32 total_chunks = 3;
  // Number of chunks successfully uploaded to S3.
  int32 chunks_uploaded_to_s3 = 4;
  // Whether the upload is complete (final message in stream).
  bool complete = 5;
  // Final result (only populated when complete=true).
  UploadResult result = 6;
}

// ============================================
// SHARED INTAKE TYPES
// ============================================

// Reusable reference for identifying a document in ingestion/deletion operations.
message DocReference {
  // Source document identifier from the origin system.
  // This is the primary key in the source system (e.g., database ID, file path).
  string source_doc_id = 1;

  // The system-derived document ID (hash of datasource_id + source_doc_id).
  // Typically populated in responses or when the client already knows the derived ID.
  string doc_id = 2;
}

// ============================================
// STREAMING INTAKE MESSAGES
// ============================================

// High-performance bidirectional streaming request for document ingestion.
//
// Follows a stateful pattern:
// 1. First message MUST contain StreamContext to establish auth and datasource.
// 2. Subsequent messages send PipeDocItems or DeleteReferences.
message UploadPipeDocStreamRequest {
  oneof payload {
    // Initial handshake message providing auth and context.
    StreamContext context = 1;
    // Document to be ingested.
    PipeDocItem item = 2;
    // Request to delete an existing document.
    DocReference delete_ref = 3;
  }
}

// Metadata for establishing a stateful gRPC stream.
message StreamContext {
  // DataSource identifier (deterministic hash of account_id + connector_id).
  string datasource_id = 1;
  // API key for authentication.
  string api_key = 2;
  // Optional session ID for grouping related operations.
  string session_id = 3;
}

// Individual document item within a stream.
message PipeDocItem {
  // The document structure with metadata and content.
  ai.pipestream.data.v1.PipeDoc pipe_doc = 1;
  // Original source identifier for doc_id generation.
  string source_doc_id = 2;
}

// Response message for individual items within a bidirectional stream.
message UploadPipeDocStreamResponse {
  // Whether the operation succeeded.
  bool success = 1;
  // Status or error message.
  string message = 2;
  // Echoes back the reference for async correlation by the client.
  DocReference ref = 3;
}

// ============================================
// UNARY DELETE MESSAGES
// ============================================

// Request to delete a document via a unary RPC.
message DeletePipeDocRequest {
  // DataSource identifier.
  string datasource_id = 1;
  // API key for authentication.
  string api_key = 2;
  // Reference to the document to be deleted.
  DocReference ref = 3;
}

// Response from document deletion.
message DeletePipeDocResponse {
  // Whether the deletion request was accepted.
  bool success = 1;
  // Status message.
  string message = 2;
}
