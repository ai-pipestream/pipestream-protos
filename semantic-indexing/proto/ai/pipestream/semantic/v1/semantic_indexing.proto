syntax = "proto3";

package ai.pipestream.semantic.v1;

import "ai/pipestream/data/v1/pipeline_core_types.proto";
import "google/protobuf/struct.proto";

option java_multiple_files = true;
option java_outer_classname = "SemanticIndexingProto";
option java_package = "ai.pipestream.semantic.v1";

// =============================================================================
// SemanticChunkerService — Streaming chunker interface
// =============================================================================
//
// Server-streaming: client sends text + chunker config, server streams back
// individual chunks. Enables pipelining to embedder as chunks arrive.
service SemanticChunkerService {
  rpc StreamChunks(StreamChunksRequest) returns (stream StreamChunksResponse);
}

// =============================================================================
// SemanticEmbedderService — Streaming embedder interface
// =============================================================================
//
// Bidirectional streaming: client pushes chunks as they arrive from chunker,
// server batches internally for GPU efficiency and streams embedded results back.
service SemanticEmbedderService {
  rpc StreamEmbeddings(stream StreamEmbeddingsRequest) returns (stream StreamEmbeddingsResponse);

  // Returns the list of embedding models and their current availability.
  rpc ListEmbeddingModels(ListEmbeddingModelsRequest) returns (ListEmbeddingModelsResponse);
}

// === Chunker Messages ===

message StreamChunksRequest {
  // Correlation ID for this chunking request.
  string request_id = 1;

  // Document ID being chunked.
  string doc_id = 2;

  // Source field name (e.g. "body", "title").
  string source_field_name = 3;

  // The text content to chunk.
  string text_content = 4;

  // DEPRECATED: Use chunk_configs for multi-config requests.
  google.protobuf.Struct chunker_config = 5;

  // DEPRECATED: Use chunk_configs for multi-config requests.
  string chunk_config_id = 6;

  // Multiple chunk configurations. When populated, NLP runs once and each config
  // is applied independently. Responses are tagged with chunk_config_id.
  // Takes precedence over the legacy single-config fields (5, 6).
  repeated ChunkConfigEntry chunk_configs = 7;
}

// Typed chunker configuration — replaces opaque Struct.
// The semantic-manager converts its JSON config to this proto before calling the chunker.
message ChunkerConfig {
  // Chunking algorithm. Default: CHUNK_ALGORITHM_TOKEN.
  ChunkAlgorithm algorithm = 1;
  // Number of units (tokens, sentences, or characters) per chunk.
  // Ignored for CHUNK_ALGORITHM_DOCLING (Docling defines chunk boundaries itself).
  int32 chunk_size = 2;
  // Number of overlapping units between consecutive chunks.
  // Ignored for CHUNK_ALGORITHM_DOCLING.
  int32 chunk_overlap = 3;
  // Whether to clean/normalize text before chunking (collapse whitespace, normalize newlines).
  bool clean_text = 4;
  // Whether to detect and preserve URLs during chunking.
  bool preserve_urls = 5;
  // Semantic chunking configuration (only used when algorithm = CHUNK_ALGORITHM_SEMANTIC).
  optional SemanticChunkingConfig semantic_config = 6;
  // Docling chunking configuration (only used when algorithm = CHUNK_ALGORITHM_DOCLING).
  optional DoclingChunkingConfig docling_config = 7;
}

// Configuration for semantic (topic-boundary) chunking.
// Used when algorithm = CHUNK_ALGORITHM_SEMANTIC.
// The semantic manager uses sentence embeddings to detect topic shifts,
// then groups sentences into coherent chunks.
message SemanticChunkingConfig {
  // Absolute similarity cutoff (0.0-1.0). Break when consecutive sentence
  // similarity drops below this value. Default: 0.5.
  float similarity_threshold = 1;

  // Break at the bottom N% of similarity transitions (0-100).
  // Combined with similarity_threshold when both are set. Default: 20.
  int32 percentile_threshold = 2;

  // Minimum sentences per semantic chunk. Small chunks are merged with
  // their most-similar neighbor. Default: 2.
  int32 min_chunk_sentences = 3;

  // Maximum sentences per semantic chunk. Large chunks are split at
  // the lowest internal similarity point. Default: 30.
  int32 max_chunk_sentences = 4;

  // Embedding model for sentence boundary detection. Can differ from
  // the indexing model (use a fast small model here). If not set,
  // uses the first embedder_config from the directive.
  optional string sentence_embedding_model = 5;

  // Whether to store sentence-level vectors as a separate result set.
  // These are the raw sentence embeddings from the boundary detection pass.
  // Default: true.
  bool store_sentence_vectors = 6;

  // Whether to compute and store centroid vectors (paragraph, section, document).
  // Centroids are computed by averaging sentence vectors — zero extra embedding cost.
  // Default: true.
  bool compute_centroids = 7;

  // Preferred order for resolving document section structure.
  // Used for section centroid computation. Tries each source in order,
  // uses the first one that has a DocOutline with sections.
  // Default: TIKA first, then DOCLING.
  repeated SectionSource section_source_priority = 8;
}

// Source for document section/outline structure.
enum SectionSource {
  SECTION_SOURCE_UNSPECIFIED = 0;
  // Use DocOutline from Tika metadata extraction.
  SECTION_SOURCE_TIKA = 1;
  // Use DocOutline from Docling document structure analysis.
  SECTION_SOURCE_DOCLING = 2;
}

// Configuration for Docling-native chunking.
// Used when ChunkerConfig.algorithm = CHUNK_ALGORITHM_DOCLING.
//
// The chunker module reads Docling's chunks directly from
// PipeDoc.parsed_metadata where parser_name = "docling" and emits them as
// SemanticChunks. No chunking cost because Docling already produced them
// during parse.
//
// If Docling data is not present in parsed_metadata, the chunker returns
// PROCESSING_OUTCOME_SKIPPED with an explicit message. There is NO fallback
// to other algorithms — if you configured DOCLING you get DOCLING or
// nothing. Configure the pipeline so the Docling parser runs upstream of
// the chunker when this algorithm is used.
message DoclingChunkingConfig {
  // Minimum character length for a Docling chunk to be emitted as-is.
  // Chunks below this threshold are eligible for grouping (if
  // group_small_chunks is true) or dropped outright. Default: 0 (emit all).
  int32 min_chunk_chars = 1;

  // When true, consecutive chunks below min_chunk_chars are aggregated into
  // a larger chunk by concatenating their text and merging provenance.
  // Grouping stops at the first non-small chunk or when the aggregated size
  // reaches max_grouped_chunk_chars. Each grouped chunk keeps references to
  // its source chunk IDs in ChunkProvenance.source_chunk_ids so consumers
  // can trace back to the original Docling cells/fragments.
  //
  // Targets the common Docling pattern of producing tiny per-cell chunks
  // (table cells, callouts, figure captions) that aren't individually
  // useful but carry meaning when aggregated with their neighbors.
  // Default: false.
  bool group_small_chunks = 2;

  // Upper bound for a grouped chunk when group_small_chunks is true.
  // Grouping stops at this size even if more small chunks follow.
  // Default: 2000.
  int32 max_grouped_chunk_chars = 3;

  // Whether to carry Docling's section/heading structure into ChunkProvenance.
  // When true, the chunker sets provenance.section_id and heading_breadcrumb
  // from the Docling document outline. Default: true.
  bool populate_provenance = 4;
}

enum ChunkAlgorithm {
  CHUNK_ALGORITHM_UNSPECIFIED = 0;
  CHUNK_ALGORITHM_TOKEN = 1;
  CHUNK_ALGORITHM_SENTENCE = 2;
  CHUNK_ALGORITHM_CHARACTER = 3;
  // Semantic chunking: sentence-level embedding similarity for topic boundary detection.
  // Handled by the semantic manager orchestrator, not the chunker module.
  CHUNK_ALGORITHM_SEMANTIC = 4;
  // Docling-native chunking: reuses chunks already produced by the Docling
  // parser. Requires Docling data in PipeDoc.parsed_metadata; no fallback.
  // Zero chunking cost. Configured via DoclingChunkingConfig.
  CHUNK_ALGORITHM_DOCLING = 5;
}

// Entry in a multi-config chunking request.
message ChunkConfigEntry {
  // Chunker config ID (e.g. "sentence_10_3", "token_500_50").
  string chunk_config_id = 1;
  // Typed chunker configuration.
  ChunkerConfig config = 2;
}

message StreamChunksResponse {
  // Correlation ID from the request.
  string request_id = 1;

  // Document ID.
  string doc_id = 2;

  // Unique chunk identifier.
  string chunk_id = 3;

  // Zero-based chunk number within this request.
  int32 chunk_number = 4;

  // The chunk text content.
  string text_content = 5;

  // Character offset in the original text where this chunk starts.
  int32 start_offset = 6;

  // Character offset in the original text where this chunk ends.
  int32 end_offset = 7;

  // Chunker config ID that produced this chunk.
  string chunk_config_id = 8;

  // Source field name.
  string source_field_name = 9;

  // True if this is the last chunk for this request.
  bool is_last = 10;

  // Optional metadata about this chunk.
  map<string, google.protobuf.Value> metadata = 11;

  // NLP-derived analytics for this chunk's text.
  optional ai.pipestream.data.v1.ChunkAnalytics chunk_analytics = 12;

  // Document-level analytics for the full source text.
  // Only populated on the last chunk (is_last=true) to avoid redundancy.
  optional ai.pipestream.data.v1.DocumentAnalytics document_analytics = 13;

  // Total number of chunks produced for this request.
  // Only populated on the last chunk (is_last=true).
  optional int32 total_chunks = 14;

  // Full NLP analysis of the source document text.
  // Only populated on the last chunk (is_last=true) to avoid redundancy.
  optional ai.pipestream.data.v1.NlpDocumentAnalysis nlp_analysis = 15;
}

// === Embedder Messages ===

message StreamEmbeddingsRequest {
  // Correlation ID.
  string request_id = 1;

  // Document ID.
  string doc_id = 2;

  // Chunk identifier.
  string chunk_id = 3;

  // Text content to embed.
  string text_content = 4;

  // Chunker config ID that produced this chunk.
  string chunk_config_id = 5;

  // Embedding model identifier (e.g. "all-MiniLM-L6-v2").
  string embedding_model_id = 6;

  // Embedder configuration as a Struct.
  google.protobuf.Struct embedder_config = 7;
}

message StreamEmbeddingsResponse {
  // Correlation ID.
  string request_id = 1;

  // Document ID.
  string doc_id = 2;

  // Chunk identifier.
  string chunk_id = 3;

  // Chunker config ID.
  string chunk_config_id = 4;

  // Embedding model identifier.
  string embedding_model_id = 5;

  // The embedding vector.
  repeated float vector = 6;

  // Whether embedding succeeded.
  bool success = 7;

  // Error message if success is false.
  string error_message = 8;
}

// === ListEmbeddingModels Messages ===

message ListEmbeddingModelsRequest {
  // Optional: only return models that are currently ready.
  bool ready_only = 1;
}

message ListEmbeddingModelsResponse {
  // All known embedding models with their current status.
  repeated EmbeddingModelInfo models = 1;

  // Whether DJL Serving is reachable.
  bool djl_serving_reachable = 2;
}

// Lifecycle status of an embedding model.
enum EmbeddingModelStatus {
  // Default/unset — treat as UNAVAILABLE.
  EMBEDDING_MODEL_STATUS_UNSPECIFIED = 0;
  // Model is loaded on the serving backend, predictions verified working.
  EMBEDDING_MODEL_STATUS_READY = 1;
  // Model is known and has a registration URI but is not currently loaded.
  // Can be loaded on demand via the serving backend's management API.
  EMBEDDING_MODEL_STATUS_LOADABLE = 2;
  // Model cannot be served: no configuration or backend unreachable.
  EMBEDDING_MODEL_STATUS_UNAVAILABLE = 3;
  // Model is loaded on the serving backend but predictions fail
  // (e.g. incompatible handler, device mismatch, out of memory).
  EMBEDDING_MODEL_STATUS_ERROR = 4;
}

message EmbeddingModelInfo {
  // Primary identifier for this model — the canonical name used in pipeline config
  // and embedding requests. Consumers should use this when referencing the model.
  string enum_name = 1 [deprecated = true]; // Deprecated: use identifier instead
  string model_name = 2; // DJL Serving model name — the path in /predictions/{name}
  string hugging_face_id = 3; // Full HuggingFace model identifier

  // Output vector dimensions.
  int32 dimensions = 4;

  // Current lifecycle status of this model.
  EmbeddingModelStatus status = 5;

  // Prefix to prepend for query embeddings (empty if none).
  string query_prefix = 6;

  // Prefix to prepend for index/passage embeddings (empty if none).
  string index_prefix = 7;

  // Human-readable description.
  string description = 8;

  // Error message when status is ERROR (empty otherwise).
  string error_message = 9;

  // Primary model identifier — the canonical name to use in pipeline config.
  // This is the config key (e.g. "minilm", "mpnet", "bge-m3").
  string identifier = 10;

  // All name variants that resolve to this model. Consumers should check
  // requested model IDs against this set for validation. Includes: config key,
  // serving name, full HuggingFace ID, and short HuggingFace name.
  repeated string aliases = 11;

  // Maximum input token length the model supports (0 = unknown/unlimited).
  int32 max_tokens = 12;
}
