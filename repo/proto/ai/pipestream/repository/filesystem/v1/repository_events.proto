syntax = "proto3";

package ai.pipestream.repository.filesystem.v1;

import "ai/pipestream/data/v1/pipeline_core_types.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "RepositoryEventsV2";
option java_package = "ai.pipestream.repository.filesystem.v1";

// Minimal source context for audit trail
message SourceContext {
  string component = 1; // REQUIRED: "repository-service", "connector-xyz"
  string operation = 2; // REQUIRED: "create", "update", "delete"
  string request_id = 3; // REQUIRED: For tracing (deterministic UUID)

  // Optional context when applicable:
  string user_id = 4; // If user-initiated
  string connector_id = 5; // If connector-initiated
  string session_id = 6; // For grouping related operations
}

// Repository event — carries enough data for the catalog index without callbacks.
message RepositoryEvent {
  // Deterministic: hash(document_id + operation + timestamp_millis)
  string event_id = 1;

  google.protobuf.Timestamp timestamp = 2;
  string document_id = 3; // Client-provided stable ID
  string account_id = 4; // From Drive entity

  SourceContext source = 5; // Who/what/where initiated this

  // Datasource scope for logical document identity (composite uniqueness with account_id + document_id).
  string datasource_id = 6;

  // Optional per-datasource retention hint (days) for OpenSearch ILM / archival jobs; default 30 if unset.
  optional int32 retention_intent_days = 7;

  // Ownership for document-level security (ACLs, connector origin).
  // account_id and datasource_id are duplicated here for convenience;
  // the OwnershipContext adds connector_id and acls.
  ai.pipestream.data.v1.OwnershipContext ownership = 8;

  // The actual state change
  oneof operation {
    Created created = 10;
    Updated updated = 11;
    Deleted deleted = 12;
  }

  // Document created in the repository.
  message Created {
    string storage_key = 1; // Storage key within the drive (e.g., connectors/{connector_id}/{document_id}.pb)
    int64 size = 2; // File size in bytes
    string content_hash = 3; // SHA-256 for deduplication
    string storage_version_id = 4; // Storage version for this creation
    string drive_name = 5; // Drive that holds this document

    // Catalog metadata — enough to index without a callback
    string name = 6; // Document name / filename
    string path = 7; // Full path within the drive
    string content_type = 8; // MIME type (e.g., "application/pdf", "text/plain")
  }

  // Document updated in the repository.
  message Updated {
    string storage_key = 1; // Storage key (may change if connector changed)
    int64 size = 2; // New size
    string content_hash = 3; // New SHA-256 hash
    string storage_version_id = 4; // New storage version
    string previous_version_id = 5; // What we replaced
    string drive_name = 6; // Drive that holds this document

    // Catalog metadata
    string name = 7; // Document name / filename
    string path = 8; // Full path within the drive
    string content_type = 9; // MIME type
  }

  // Document deleted from the repository.
  message Deleted {
    string reason = 1; // Why it was deleted
    bool purged = 2; // If true, storage object was also deleted
  }
}

// Separate analytics events (not for Kafka state stream)
// These would go to metrics/logging systems instead
message AnalyticsEvent {
  string event_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof metric {
    AccessMetric access = 10;
    PerformanceMetric performance = 11;
  }

  message AccessMetric {
    string document_id = 1;
    string user_id = 2;
    string access_type = 3; // READ, LIST, etc.
    int64 bytes_read = 4;
    bool cache_hit = 5;
  }

  message PerformanceMetric {
    string operation = 1;
    int64 duration_ms = 2;
    int64 bytes_processed = 3;
  }
}
